services:
  artstore:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
